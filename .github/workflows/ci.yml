name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT: aoe2-tournaments
  GCP_REGION: europe-north1
  AR_HOST: europe-north1-docker.pkg.dev
  AR_REPO: aoe2-tournament-bot
  IMAGE_NAME: aoe2-tournament-bot
  WORKER_POOL: aoe2-tournament-bot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  lint:
    runs-on: ubuntu-latest
    # NOTE: deliberately NOT a dependency of `deploy` — fmt/clippy noise must
    # not block a fix from shipping.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --tests -- -D warnings

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for WIF
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}
          # Short-lived token for docker/login-action below. Additive — does
          # not affect gcloud auth used by the Update Worker Pool step.
          token_format: 'access_token'

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/setup-buildx-action@v3

      # Authenticate the buildx (docker-container driver) builder to Artifact
      # Registry. The old `gcloud auth configure-docker` cred-helper isn't
      # reliably visible inside the build container, so log in with the WIF
      # access token instead.
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.AR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          IMAGE_BASE: ${{ env.AR_HOST }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}
        with:
          context: .
          push: true
          # build-push-action v6 defaults to emitting provenance/SBOM
          # attestations, which turns the push into an OCI image index.
          # Keep a single-manifest image so `:<sha>` pinning stays simple.
          provenance: false
          tags: |
            ${{ env.IMAGE_BASE }}:${{ github.sha }}
            ${{ env.IMAGE_BASE }}:latest
          # cargo-chef dependency layer is only reused if the layer cache
          # persists between (fresh) CI runners — back it with a registry
          # cache image. The `buildcache` tag is excluded from the Artifact
          # Registry cleanup policy (see terraform/artifact_registry.tf).
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}:buildcache,mode=max

      - name: Update Worker Pool
        run: |
          gcloud run worker-pools update ${{ env.WORKER_POOL }} \
            --image="${{ env.AR_HOST }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }}
