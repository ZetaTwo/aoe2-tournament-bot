# Secrets and per-environment knobs. Copy to config.toml and fill in.
# The file ends up in Secret Manager (`aoe2-tournament-bot-config`) in
# production; locally the bot reads it from CONFIG_PATH (default ./config.toml).
#
# Tournament-to-channel routing lives in tournaments.toml — it's checked
# into git and baked into the image. Tracing log level is set via RUST_LOG.

[bot]
discord_token = "REPLACE_ME"
# At least one Discord user ID. All listed users receive a DM when a results
# row fails to land in the sheet.
admin_user_ids = [123456789012345678]

[gcp]
# Bucket that replay attachments are uploaded into.
bucket = "aoe2-tournament-replays"
# Spreadsheet ID. Each tournament writes to a tab named exactly after its `name`.
sheet_id = "REPLACE_WITH_SHEET_ID"
